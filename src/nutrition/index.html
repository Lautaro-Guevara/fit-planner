<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition & Recipes</title>

    <link rel="stylesheet" href="../css/nutrition.css">
    <script src="../js/nutrition.js" type="module"></script>
</head>
<body>
    <header class="divider" id="main-header"></header>

<main class="nutrition-page">

    

    <section class="page-header">
        <h1>Nutrition & Recipes</h1>
        <p>Healthy meal ideas to support your fitness goals</p>
    </section>

    <section class="search-section">

        <input
            type="text"
            id="recipeSearch"
            placeholder="Search recipes..."
        >

    </section>

    <section class="categories">

        <h3>Categories</h3>

        <div class="category-buttons">

            <button class="active">All</button>
            <button>Breakfast</button>
            <button>Lunch</button>
            <button>Dinner</button>
            <button>Snack</button>

        </div>

    </section>

    <p class="results-count">
        Showing <span id="recipeCount">0</span> recipes
    </p>

    <section
        id="recipeGrid"
        class="recipe-grid"
    >
        <!-- Dynamic cards -->
    </section>

    

</main>
<footer class="divider" id="main-footer"></footer>

</body>
</html>

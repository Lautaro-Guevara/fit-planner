<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites</title>
    <link rel="shortcut icon" href="../public/images/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="../css/favorites.css">
    <script src="../js/favorites.js" type="module"></script>
</head>
<body>

    <header class="divider" id="main-header"></header>

<main class="favorites-page">

    
    <section class="page-header">
        <h1>Your Favorites</h1>
        <p>Exercises and recipes you've saved</p>
    </section>

    <section class="favorites-grid">

        <!-- Exercises -->
        <section class="favorites-section">

            <div class="section-header">
                <h2>
                    <span class="section-icon" aria-hidden="true">
                        <svg class="section-icon-svg" viewBox="0 0 24 24" focusable="false">
                            <path d="M6.4 7.7 4 10.1m4.3-4.9-4.9 4.9m7.4-1.2-4.9 4.9m7.4-1.2-4.9 4.9m8-12.2-2.4 2.4m2.7 5.7 2.4-2.4m-4.3 4.9 4.9-4.9m-7.4 1.2 4.9-4.9m-7.4 1.2 4.9-4.9" />
                        </svg>
                    </span>
                    Saved Exercises
                    <span class="count">(<span id="exerciseCount">0</span>)</span>
                </h2>
            </div>

            <div id="savedExercises">
                <!-- Dynamic Content -->
            </div>

        </section>

        <!-- Recipes -->
        <section class="favorites-section">

            <div class="section-header">
                <h2>
                    <span class="section-icon" aria-hidden="true">
                        <svg class="section-icon-svg" viewBox="0 0 24 24" focusable="false">
                            <path d="M12 8.5c-.8-1.9-.3-3.6 1.6-5.1m-1.6 5.1c-2.2-2.4-6.5-2.2-8 .8-1.7 3.4-.5 8.9 3.3 11.6 1.6 1.1 2.8.6 4.7.6s3.1.5 4.7-.6c3.8-2.7 5-8.2 3.3-11.6-1.5-3-5.8-3.2-8-.8Z" />
                        </svg>
                    </span>
                    Saved Recipes
                    <span class="count">(<span id="recipeCount">0</span>)</span>
                </h2>
            </div>

            <div id="savedRecipes">
                <!-- Dynamic Content -->
            </div>

        </section>

    </section>

    

</main>
<footer class="divider" id="main-footer"></footer>

</body>
</html>

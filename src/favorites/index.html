<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites</title>

    <link rel="stylesheet" href="../css/favorites.css">
    <script src="../js/favorites.js" type="module"></script>
</head>
<body>

    <header class="divider" id="main-header"></header>

<main class="favorites-page">

    
    <section class="page-header">
        <h1>Your Favorites</h1>
        <p>Exercises and recipes you've saved</p>
    </section>

    <section class="favorites-grid">

        <!-- Exercises -->
        <section class="favorites-section">

            <div class="section-header">
                <h2>
                    🏋 Saved Exercises
                    (<span id="exerciseCount">0</span>)
                </h2>
            </div>

            <div id="savedExercises">
                <!-- Dynamic Content -->
            </div>

        </section>

        <!-- Recipes -->
        <section class="favorites-section">

            <div class="section-header">
                <h2>
                    🍎 Saved Recipes
                    (<span id="recipeCount">0</span>)
                </h2>
            </div>

            <div id="savedRecipes">
                <!-- Dynamic Content -->
            </div>

        </section>

    </section>

    

</main>
<footer class="divider" id="main-footer"></footer>

</body>
</html>
